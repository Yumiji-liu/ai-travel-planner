name: Build and Push to Dist Branch

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Push to dist branch
        run: |
          # Copy only the static export (out/) to a temp location OUTSIDE the repo
          mkdir -p /tmp/ai-travel-dist
          cp -r out/. /tmp/ai-travel-dist/

          # Create new dist branch with no history
          git checkout --orphan dist

          # Remove everything from working tree
          git ls-files -z | xargs -0 rm -f 2>/dev/null || true
          rm -rf .next node_modules out .gitignore .gitattributes 2>/dev/null || true

          # Copy only the static export files
          cp -r /tmp/ai-travel-dist/. .
          rm -rf /tmp/ai-travel-dist

          git add -A
          git commit -m "Build: ${GITHUB_SHA}"
          git push -f origin dist
