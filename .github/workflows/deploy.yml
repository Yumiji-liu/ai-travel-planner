name: Build and Push to Dist Branch

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Push dist branch
        run: |
          git checkout -b dist
          git rm -rf .
          cp -r out/* .
          rm -rf out
          git add -A
          git commit -m "Build: ${{ github.sha }} - ${{ github.event.head_commit.message }}"
          git push origin dist --force