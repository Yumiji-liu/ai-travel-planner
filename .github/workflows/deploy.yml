name: Build and Push to Dist Branch

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Push to dist branch
        run: |
          # Backup built output
          cp -r out /tmp/dist_backup
          # Create orphan dist branch
          git checkout --orphan dist
          # Remove everything tracked (git rm handles ignored files via --ignore-unmatch won't help)
          # Use git ls-files to remove only tracked files
          git rm -rf . --quiet || true
          # Also remove leftover directories that were in .gitignore on main
          rm -rf .next node_modules out 2>/dev/null || true
          # Restore built files (they don't have .next or node_modules)
          cp -r /tmp/dist_backup/out/* .
          rm -rf /tmp/dist_backup
          git add -A
          git commit -m "Build: ${GITHUB_SHA}"
          git push -f origin dist
